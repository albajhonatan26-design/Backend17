<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskGlass - Minimal App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">

    <div class="glass-container">
        <header>
            <div class="header-top">
                <h1>Mis Tareas</h1>
                <button id="theme-toggle" aria-label="Cambiar tema">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
            <p id="date-display"></p>
        </header>

        <div id="stats-container">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-number" id="total-count">0</span>
                    <span class="stat-label">Creadas</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="pending-count">0</span>
                    <span class="stat-label">Pendientes</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="completed-count">0</span>
                    <span class="stat-label">Completadas</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <form id="task-form">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Añadir una nueva tarea..." required autocomplete="off">
                <input type="datetime-local" id="task-date" required>
            </div>
            <button type="submit" id="add-btn"><i class="fa-solid fa-plus"></i></button>
        </form>

        <ul id="task-list">
            </ul>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
